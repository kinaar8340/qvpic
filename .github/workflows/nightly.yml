name: Nightly Dev Build + TestPyPI

on:
  schedule:
    - cron: '0 2 * * *'      # Every day at 2:00 AM UTC
  workflow_dispatch:

jobs:
  nightly:
    runs-on: ubuntu-latest
    environment: testpypi      # ← Required for Trusted Publishing
    permissions:
      contents: write
      id-token: write          # ← Required for OIDC token

    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install -e .[dev]
          pip install build

      - name: Run full test suite
        run: |
          rm -rf src/__pycache__ tests/__pycache__ .pytest_cache
          python -m pytest -q --cov --cov-report=xml

      - name: Bump dev version
        run: |
          DATE=$(date +%Y%m%d)
          sed -i "s/version = \"10.2.0\"/version = \"10.2.1.dev${DATE}\"/" pyproject.toml

      - name: Build package
        run: python -m build

      - name: Publish to TestPyPI (Trusted Publishing)
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          skip-existing: true
