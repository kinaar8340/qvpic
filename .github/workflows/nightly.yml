name: Nightly Dev Build + TestPyPI

on:
  schedule:
    - cron: '0 2 * * *'      # Every day at 2:00 AM UTC
  workflow_dispatch:         # Manual trigger

jobs:
  nightly:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write         # Required for Trusted Publishing

    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install CPU-only Torch + dev dependencies
        run: |
          python -m pip install --upgrade pip
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install -e .[dev]

      - name: Run full test suite
        run: |
          rm -rf src/__pycache__ tests/__pycache__ .pytest_cache
          python -m pytest -q --cov --cov-report=xml

      - name: Bump dev version
        run: |
          DATE=$(date +%Y%m%d)
          sed -i "s/version = \"10.2.0\"/version = \"10.2.1.dev${DATE}\"/" pyproject.toml

      - name: Build package
        run: python -m build

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          skip-existing: true
        env:
          TWINE_USERNAME: __token__   # not used with Trusted Publishing, but required by the action

      - name: Create/Update Nightly GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: nightly
          name: QVPIC Nightly Build (dev)
          prerelease: true
          draft: false
          generate_release_notes: true
          files: |
            dist/*.tar.gz
            dist/*.whl
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
