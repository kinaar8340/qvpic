name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10']

    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install CPU-only Torch + dev deps
        run: |
          python -m pip install --upgrade pip
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install -e .[dev]

      - name: Run full test suite (MAX VERBOSE)
        run: |
          rm -rf src/__pycache__ tests/__pycache__ .pytest_cache
          python -m pytest -q --cov --cov-report=xml \
            --tb=short -rA --maxfail=1 -vvv
        env:
          TORCH_DEVICE: cpu

      - name: Upload coverage
        uses: codecov/codecov-action@v4

  release:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: QVPIC v${{ github.ref_name }} — RubikCone + ShellCube
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            checkpoints/pic_test_latest.pt
            README.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
